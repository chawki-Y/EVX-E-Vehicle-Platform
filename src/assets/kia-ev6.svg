<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f4f4f4"/>
  
  <!-- Kia EV6 Body (Futuristic Crossover) -->
  <path d="M140 248 Q140 208 180 188 L620 188 Q660 208 660 248 L660 288 Q660 308 640 308 L160 308 Q140 308 140 288 Z" fill="#4A90E2" stroke="#357ABD" stroke-width="2"/>
  
  <!-- Aerodynamic Roof -->
  <path d="M220 188 Q250 158 380 153 L420 153 Q550 158 580 188" fill="#5BA0F2" stroke="#4A90E2" stroke-width="1"/>
  
  <!-- Sleek Windows -->
  <path d="M240 188 Q260 168 370 163 L430 163 Q540 168 560 188 L560 203 L240 203 Z" fill="#6495ED" opacity="0.8"/>
  
  <!-- Front Wheel -->
  <circle cx="215" cy="288" r="38" fill="#2F2F2F" stroke="#444" stroke-width="3"/>
  <circle cx="215" cy="288" r="24" fill="#555"/>
  <circle cx="215" cy="288" r="10" fill="#777"/>
  
  <!-- Rear Wheel -->
  <circle cx="585" cy="288" r="38" fill="#2F2F2F" stroke="#444" stroke-width="3"/>
  <circle cx="585" cy="288" r="24" fill="#555"/>
  <circle cx="585" cy="288" r="10" fill="#777"/>
  
  <!-- Kia Tiger Nose Grille -->
  <path d="M640 240 Q650 235 660 240 L660 250 L650 255 L640 250 Z" fill="#333" stroke="#555" stroke-width="1"/>
  <path d="M640 255 Q650 250 660 255 L660 265 L650 270 L640 265 Z" fill="#333" stroke="#555" stroke-width="1"/>
  
  <!-- Kia Logo Area -->
  <ellipse cx="400" cy="225" rx="18" ry="10" fill="#DC143C" stroke="#B22222" stroke-width="2"/>
  <text x="400" y="230" text-anchor="middle" fill="#FFF" font-family="Arial, sans-serif" font-size="8" font-weight="bold">KIA</text>
  
  <!-- Digital Light Signature -->
  <rect x="300" y="245" width="3" height="8" fill="#00BFFF" opacity="0.8"/>
  <rect x="306" y="245" width="3" height="8" fill="#00BFFF" opacity="0.8"/>
  <rect x="312" y="245" width="3" height="8" fill="#00BFFF" opacity="0.8"/>
  <rect x="485" y="245" width="3" height="8" fill="#00BFFF" opacity="0.8"/>
  <rect x="491" y="245" width="3" height="8" fill="#00BFFF" opacity="0.8"/>
  <rect x="497" y="245" width="3" height="8" fill="#00BFFF" opacity="0.8"/>
  
  <!-- Flush Door Handles -->
  <rect x="290" y="225" width="6" height="3" fill="#357ABD" rx="1"/>
  <rect x="510" y="225" width="6" height="3" fill="#357ABD" rx="1"/>
  
  <!-- Ground Shadow -->
  <ellipse cx="400" cy="330" rx="270" ry="18" fill="#000" opacity="0.1"/>
</svg>