<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f8f8"/>
  
  <!-- Crossover Body (Modern Angular Design) -->
  <path d="M140 250 Q140 210 180 190 L620 190 Q660 210 660 250 L660 285 Q660 305 640 305 L160 305 Q140 305 140 285 Z" fill="#E8E8E8" stroke="#CCCCCC" stroke-width="2"/>
  
  <!-- Angular Roof Design -->
  <path d="M210 190 L250 160 L370 155 L430 155 L550 160 L590 190" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Futuristic Windows -->
  <path d="M230 190 L260 170 L360 165 L440 165 L540 170 L570 190 L570 205 L230 205 Z" fill="#87CEEB" opacity="0.75"/>
  
  <!-- Front Wheel -->
  <circle cx="210" cy="285" r="40" fill="#2A2A2A" stroke="#444" stroke-width="3"/>
  <circle cx="210" cy="285" r="26" fill="#555"/>
  <circle cx="210" cy="285" r="10" fill="#777"/>
  
  <!-- Rear Wheel -->
  <circle cx="590" cy="285" r="40" fill="#2A2A2A" stroke="#444" stroke-width="3"/>
  <circle cx="590" cy="285" r="26" fill="#555"/>
  <circle cx="590" cy="285" r="10" fill="#777"/>
  
  <!-- Futuristic LED Headlights -->
  <rect x="640" y="230" width="20" height="6" fill="#00FFFF" rx="3" opacity="0.9"/>
  <rect x="640" y="240" width="20" height="6" fill="#00FFFF" rx="3" opacity="0.9"/>
  <rect x="640" y="250" width="20" height="6" fill="#00FFFF" rx="3" opacity="0.9"/>
  
  <!-- Hyundai Logo Area -->
  <ellipse cx="400" cy="225" rx="20" ry="12" fill="#1E3A8A" stroke="#1E40AF" stroke-width="2"/>
  <text x="400" y="230" text-anchor="middle" fill="#FFF" font-family="Arial, sans-serif" font-size="8" font-weight="bold">H</text>
  
  <!-- Pixel LED Pattern -->
  <rect x="300" y="240" width="4" height="4" fill="#00FFFF" opacity="0.7"/>
  <rect x="308" y="240" width="4" height="4" fill="#00FFFF" opacity="0.7"/>
  <rect x="316" y="240" width="4" height="4" fill="#00FFFF" opacity="0.7"/>
  <rect x="480" y="240" width="4" height="4" fill="#00FFFF" opacity="0.7"/>
  <rect x="488" y="240" width="4" height="4" fill="#00FFFF" opacity="0.7"/>
  <rect x="496" y="240" width="4" height="4" fill="#00FFFF" opacity="0.7"/>
  
  <!-- Charging Port -->
  <circle cx="180" cy="220" r="6" fill="#00FF00" stroke="#00CC00" stroke-width="2"/>
  
  <!-- Ground Shadow -->
  <ellipse cx="400" cy="330" rx="270" ry="18" fill="#000" opacity="0.1"/>
</svg>