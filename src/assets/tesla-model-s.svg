<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Car Body -->
  <path d="M150 250 Q150 200 200 180 L600 180 Q650 200 650 250 L650 280 Q650 300 630 300 L170 300 Q150 300 150 280 Z" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  
  <!-- Car Roof -->
  <path d="M220 180 Q250 150 350 140 L450 140 Q550 150 580 180" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  
  <!-- Windows -->
  <path d="M240 180 Q260 160 340 155 L460 155 Q540 160 560 180 L560 200 L240 200 Z" fill="#87ceeb" opacity="0.8"/>
  
  <!-- Front Wheel -->
  <circle cx="220" cy="280" r="35" fill="#333" stroke="#555" stroke-width="3"/>
  <circle cx="220" cy="280" r="20" fill="#666"/>
  <circle cx="220" cy="280" r="8" fill="#999"/>
  
  <!-- Rear Wheel -->
  <circle cx="580" cy="280" r="35" fill="#333" stroke="#555" stroke-width="3"/>
  <circle cx="580" cy="280" r="20" fill="#666"/>
  <circle cx="580" cy="280" r="8" fill="#999"/>
  
  <!-- Headlights -->
  <ellipse cx="640" cy="240" rx="15" ry="8" fill="#fff" opacity="0.9"/>
  <ellipse cx="640" cy="260" rx="15" ry="8" fill="#fff" opacity="0.9"/>
  
  <!-- Tesla Logo Area -->
  <rect x="380" y="220" width="40" height="20" fill="#1a1a1a" rx="5"/>
  <text x="400" y="235" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">T</text>
  
  <!-- Door Lines -->
  <line x1="320" y1="180" x2="320" y2="280" stroke="#444" stroke-width="1" opacity="0.5"/>
  <line x1="480" y1="180" x2="480" y2="280" stroke="#444" stroke-width="1" opacity="0.5"/>
  
  <!-- Side Mirror -->
  <ellipse cx="200" cy="200" rx="8" ry="5" fill="#333"/>
  
  <!-- Ground Shadow -->
  <ellipse cx="400" cy="320" rx="250" ry="15" fill="#000" opacity="0.1"/>
</svg>