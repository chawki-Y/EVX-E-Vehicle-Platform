<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f5f5f5"/>
  
  <!-- SUV Body (Taller Profile) -->
  <path d="M130 240 Q130 200 170 180 L630 180 Q670 200 670 240 L670 290 Q670 310 650 310 L150 310 Q130 310 130 290 Z" fill="#2C3E50" stroke="#1B2631" stroke-width="2"/>
  
  <!-- SUV Roof (Higher) -->
  <path d="M200 180 Q230 140 380 130 L420 130 Q570 140 600 180" fill="#34495E" stroke="#2C3E50" stroke-width="1"/>
  
  <!-- Large SUV Windows -->
  <path d="M220 180 Q240 150 370 145 L430 145 Q560 150 580 180 L580 200 L220 200 Z" fill="#5DADE2" opacity="0.8"/>
  
  <!-- Front Wheel (Larger for SUV) -->
  <circle cx="200" cy="290" r="42" fill="#1C1C1C" stroke="#333" stroke-width="4"/>
  <circle cx="200" cy="290" r="28" fill="#444"/>
  <circle cx="200" cy="290" r="15" fill="#666"/>
  
  <!-- Rear Wheel (Larger for SUV) -->
  <circle cx="600" cy="290" r="42" fill="#1C1C1C" stroke="#333" stroke-width="4"/>
  <circle cx="600" cy="290" r="28" fill="#444"/>
  <circle cx="600" cy="290" r="15" fill="#666"/>
  
  <!-- BMW Kidney Grille -->
  <ellipse cx="655" cy="230" rx="12" ry="20" fill="#333" stroke="#555" stroke-width="2"/>
  <ellipse cx="655" cy="260" rx="12" ry="20" fill="#333" stroke="#555" stroke-width="2"/>
  
  <!-- BMW Logo Area -->
  <circle cx="400" cy="220" r="18" fill="#0066CC" stroke="#004499" stroke-width="2"/>
  <circle cx="400" cy="220" r="12" fill="#FFF"/>
  <text x="400" y="225" text-anchor="middle" fill="#0066CC" font-family="Arial, sans-serif" font-size="8" font-weight="bold">BMW</text>
  
  <!-- SUV Running Boards -->
  <rect x="180" y="300" width="240" height="8" fill="#555" rx="4"/>
  <rect x="380" y="300" width="240" height="8" fill="#555" rx="4"/>
  
  <!-- Door Handles -->
  <rect x="280" y="220" width="8" height="4" fill="#888" rx="2"/>
  <rect x="520" y="220" width="8" height="4" fill="#888" rx="2"/>
  
  <!-- Roof Rails -->
  <rect x="220" y="135" width="360" height="4" fill="#888" rx="2"/>
  
  <!-- Ground Shadow -->
  <ellipse cx="400" cy="340" rx="280" ry="20" fill="#000" opacity="0.12"/>
</svg>