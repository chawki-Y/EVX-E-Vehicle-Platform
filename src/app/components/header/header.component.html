<header class="site-header">
    <button type="button" class="brand-button" aria-label="Go to EVX home" (click)="navigateToHomePage()">
    <img src="assets/EVX logo2.png" class="logo" alt="EVX"
     appOptimizeImage 
     [optimizeWidth]="200" 
     [optimizeQuality]="90" 
     [lazyLoad]="false">
    </button>
    <nav>
      <ng-container *ngIf="f === 2; else createAccount">
        <button type="button" class="icon-btn" (click)="navigateToLikes()" title="Saved vehicles" aria-label="Saved vehicles">
          <i class="fas fa-heart"></i>
          <span class="badge" *ngIf="likesCount > 0">{{ likesCount }}</span>
        </button>
        <button type="button" class="icon-btn" (click)="navigateToCart()" title="Shopping cart" aria-label="Shopping cart">
          <i class="fas fa-shopping-cart"></i>
          <span class="badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </button>
        <button type="button" class="icon-btn" title="Account" aria-label="Account"><i class="fas fa-user"></i></button>
      </ng-container>
      <ng-template #createAccount>
        <button type="button" class="icon-btn create-account">Create Account</button>
      </ng-template>
    </nav>
  </header>
