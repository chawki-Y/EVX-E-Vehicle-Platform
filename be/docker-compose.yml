version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: evx-postgres
    environment:
      POSTGRES_DB: evx_db
      POSTGRES_USER: evx_user
      POSTGRES_PASSWORD: evx_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evx_user -d evx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: