services:
  postgres:
    image: postgres:17-alpine
    container_name: evx-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-evx_db}
      POSTGRES_USER: ${DB_USER:-evx_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-evx_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-evx_user} -d ${DB_NAME:-evx_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
